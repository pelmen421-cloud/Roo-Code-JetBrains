name: Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest   # <-- меняем ubuntu на macOS
    strategy:
      matrix:
        node-version: [20.x]   # Node.js 20+ для совместимости с зависимостями
        java: [17]

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
        submodules: 'recursive'

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'

    # На macOS не нужны X11-библиотеки, они уже есть в системе
    - name: Grant execute permission for scripts
      run: |
        chmod +x scripts/*.sh
        chmod +x scripts/lib/*.sh
        chmod +x jetbrains_plugin/gradlew

    - name: Setup environment
      run: |
        npm install -g pnpm
        ./scripts/setup.sh

    - name: Build plugin
      run: ./scripts/build.sh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: RooCode.zip
        path: dist/*.zip
